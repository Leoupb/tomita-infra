name: CI/CD — Tomita API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint + Tests
  # ─────────────────────────────────────────────
  test:
    name: Validar y probar aplicación
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependencias
        working-directory: app
        run: npm install

      - name: Ejecutar pruebas unitarias
        working-directory: app
        run: npm test
        env:
          NODE_ENV: test

  # ─────────────────────────────────────────────
  # JOB 2: Terraform Validate
  # ─────────────────────────────────────────────
  terraform-validate:
    name: Validar infraestructura Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init (validación sin backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  # ─────────────────────────────────────────────
  # JOB 3: Deploy (solo push a main)
  # ─────────────────────────────────────────────
  deploy:
    name: Desplegar en AWS
    runs-on: ubuntu-latest
    needs: [test, terraform-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verificar conexión AWS
        run: aws sts get-caller-identity

      - name: Verificar servicio desplegado
        run: |
          echo "Verificando health del ALB..."
          curl -f http://tomita-alb-1141831403.us-east-1.elb.amazonaws.com/health || echo "ALB no disponible"
