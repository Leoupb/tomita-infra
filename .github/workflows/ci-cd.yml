name: CI/CD — Tomita API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:      us-east-1
  TF_VERSION:      1.6.6
  NODE_VERSION:    18

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint + Tests
  # ─────────────────────────────────────────────
  test:
    name: Validar y probar aplicación
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package.json

      - name: Instalar dependencias
        working-directory: app
        run: npm ci

      - name: Lint (ESLint)
        working-directory: app
        run: npm run lint || true   # no bloquear si no hay .eslintrc aún

      - name: Ejecutar pruebas unitarias
        working-directory: app
        run: npm test
        env:
          NODE_ENV: test

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: app/coverage/

  # ─────────────────────────────────────────────
  # JOB 2: Terraform Validate
  # ─────────────────────────────────────────────
  terraform-validate:
    name: Validar infraestructura Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init (solo validación, sin backend)
        working-directory: terraform
        run: |
          terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  # ─────────────────────────────────────────────
  # JOB 3: Terraform Plan (solo en PR)
  # ─────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [test, terraform-validate]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -no-color \
            -out=tfplan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Guardar plan como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

  # ─────────────────────────────────────────────
  # JOB 4: Deploy (solo en push a main)
  # ─────────────────────────────────────────────
  deploy:
    name: Desplegar en AWS
    runs-on: ubuntu-latest
    needs: [test, terraform-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}"
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Obtener outputs de Terraform
        working-directory: terraform
        run: terraform output -no-color

      - name: Actualizar app en instancias via SSM
        run: |
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --filters Name=tag:Project,Values=tomita-api \
            --query 'AutoScalingGroups[0].AutoScalingGroupName' \
            --output text)

          INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names $ASG_NAME \
            --query 'AutoScalingGroups[0].Instances[*].InstanceId' \
            --output text)

          for INSTANCE_ID in $INSTANCES; do
            echo "Actualizando instancia: $INSTANCE_ID"
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["cd /opt/tomita-api && git pull origin main && cd app && npm install --production && pm2 restart tomita-api"]' \
              --output text
          done

      - name: Verificar health del servicio
        working-directory: terraform
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "Verificando: http://$ALB_DNS/health"
          sleep 30
          curl -f "http://$ALB_DNS/health" && echo "Servicio OK"
